<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body{font-family:Arial;height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#667eea,#764ba2);}
.card{background:white;padding:30px;border-radius:15px;width:350px;text-align:center;}
input,button{width:100%;padding:10px;margin:10px 0;border-radius:8px;border:1px solid #ccc;}
button{background:#b4e75c;color:white;border:none;cursor:pointer;}
</style>
</head>
<body>

<div class="card">
<h2>Create Account</h2>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
</div>

<script>
function register(){

    let userName = document.getElementById("name").value;
    let userEmail = document.getElementById("email").value;
    let userPassword = document.getElementById("password").value;

    // Save correctly with SAME keys
    localStorage.setItem("name", userName);
    localStorage.setItem("email", userEmail);
    localStorage.setItem("password", userPassword);

    alert("Registration Successful!");
    window.location="login.html";
}

</script>

</body>
</html>
