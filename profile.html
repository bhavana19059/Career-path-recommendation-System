<!DOCTYPE html>
<html>
<head>
<title>Student Profile</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#dfe9f3,#ffffff);
text-align:center;
}

.card{
width:420px;
margin:60px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 15px 30px rgba(0,0,0,0.2);
text-align:left;
}

h2{
text-align:center;
margin-bottom:20px;
}

p{
margin:10px 0;
font-size:16px;
}

.highlight{
background:#f1f2f6;
padding:10px;
border-radius:10px;
margin-top:15px;
}

.path{
background:#dfe6e9;
padding:8px;
margin:5px 0;
border-radius:8px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border-radius:10px;
border:none;
font-weight:bold;
cursor:pointer;
}

.edit{
background:linear-gradient(90deg,#6c5ce7,#a29bfe);
color:white;
}

.logout{
background:#2d3436;
color:white;
}
</style>

</head>

<body>

<div class="card">

<h2>Student Profile</h2>

<p><b>Name:</b> <span id="name"></span></p>
<p><b>Email:</b> <span id="email"></span></p>

<p><b>Favorite Subject:</b> <span id="subject"></span></p>
<p><b>Dream Job:</b> <span id="job"></span></p>
<p><b>Skills:</b> <span id="skills"></span></p>

<div class="highlight">
<b>Recommended Career Paths:</b>
<div id="paths"></div>
</div>

<button class="edit" onclick="editDetails()">Edit Details</button>
<button class="logout" onclick="logout()">Logout</button>

</div>

<script>

// Load user basic info
document.getElementById("name").innerText = localStorage.getItem("name");
document.getElementById("email").innerText = localStorage.getItem("email");

// Load new career data
document.getElementById("subject").innerText = localStorage.getItem("subject");
document.getElementById("job").innerText = localStorage.getItem("dreamJob");
document.getElementById("skills").innerText = localStorage.getItem("skills");

// Load career paths
let paths = JSON.parse(localStorage.getItem("careerPaths")) || [];

let output = "";
paths.forEach(function(p){
output += `<div class="path">👉 ${p}</div>`;
});

document.getElementById("paths").innerHTML = output;

// Buttons
function editDetails(){
window.location = "dashboard.html";
}

function logout(){
window.location = "login.html";
}

</script>

</body>
</html>
